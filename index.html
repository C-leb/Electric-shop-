<script>
const PHONE_NUMBER = "0711011011";

const products = [
    {name:"SONY PLAYSTATION 5", price:"120,499", img:"IMG13.JPG"},
    {name:"Smart TV", price:"10,499", img:"IMG1.JPG"},
    {name:"HP Laptop", price:"34,500", img:"IMG2.JPG"},
    {name:"Microwave", price:"8,999", img:"IMG3.JPG"},
    {name:"Fridge", price:"45,000", img:"IMG4.JPG"},
    {name:"Blender", price:"2,499", img:"IMG5.JPG"},
    {name:"Kettle", price:"1,800", img:"IMG6.JPG"},
    {name:"Iron Box", price:"2,200", img:"IMG7.JPG"},
    {name:"Washing Machine", price:"38,000", img:"IMG8.JPG"},
    {name:"Cooker", price:"25,000", img:"IMG9.JPG"},
    {name:"Fan", price:"3,000", img:"IMG10.JPG"},
    {name:"Sound System", price:"12,000", img:"IMG11.JPG"},
    {name:"Power Bank", price:"2,000", img:"IMG12.JPG"}
];

const container = document.getElementById("productContainer");

products.forEach(product => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <div class="badge">HOT</div>
        <img src="${product.img}" alt="${product.name}">
        <h3>${product.name}</h3>
        <p class="price">KSh ${product.price}</p>

        <button onclick="showNumber(this)">Order Now</button>

        <p class="phone hidden">
            📞 <a href="tel:${PHONE_NUMBER}">${PHONE_NUMBER}</a>
        </p>
    `;

    container.appendChild(card);
});

function showNumber(btn){
    const phone = btn.nextElementSibling;
    phone.classList.toggle("hidden");
}
</script>
